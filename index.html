<!-- index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Gallery</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <h1>Gallery</h1>

    <section class="gallery" id="gallery">
      <img src="https://picsum.photos/id/1015/800/600" alt="Mountain lake" />
      <img src="https://picsum.photos/id/1025/800/600" alt="Dog portrait" />
      <img src="https://picsum.photos/id/1035/800/600" alt="Forest path" />
      <img src="https://picsum.photos/id/1043/800/600" alt="Beach rocks" />
      <img src="https://picsum.photos/id/1069/800/600" alt="City skyline" />
      <img src="https://picsum.photos/id/1074/800/600" alt="Desert road" />
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="close" id="closeBtn" aria-label="Close image">×</button>
    <img id="lightboxImg" alt="" />
  </div>

  <script src="script.js"></script>
</body>
</html>
