<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Gallery</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="page">
    <h1>Recent</h1>

    <section class="gallery" id="gallery">
      <div class="item">
        <img src="docs/20260323_sunlight.jpg" alt="20260323 sunlight"/>
        <div class="label">2026-03-23</div>
      </div>
      
      <div class="item">
        <img src="docs/20260131_vinyl.jpg" alt="20260131 vinyl"/>
        <div class="label">2026-01-31</div>
      </div>
      
      <div class="item">
        <img src="docs/20260115_flower.jpg" alt="20260115 flower"/>
        <div class="label">2026-01-15</div>
      </div>
      
      <div class="item">
        <img src="docs/20260308_everythinggoeswell.jpg" alt="20260308 everything goes well"/>
        <div class="label">2026-03-08</div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="close" id="closeBtn" aria-label="Close image">×</button>
    <img id="lightboxImg" alt=""/>
  </div>

  <script src="script.js"></script>
</body>
</html>
